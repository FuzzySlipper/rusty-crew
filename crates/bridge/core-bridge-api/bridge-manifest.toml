# Rusty-Crew core bridge manifest (unified v1)
#
# This is the active bridge-surface source of truth for the scaffold. It follows
# the Den `rusty-crew-unified-architecture` document, not the historical
# `docs/pi-crew-core-bridge-manifest.md` operation list.
#
# Boundary rule: Rust owns deterministic coordination. TypeScript owns the
# brain island and platform adapters. Internal Rust coordination mechanics
# (message routing, worker spawning, wake threshold evaluation, action
# validation/execution) are intentionally not TS-callable operations.

[manifest]
version = 1
owning_crate = "rusty-crew-core-bridge-api"
facade_package = "@rusty-crew/core-bridge"
native_package = "@rusty-crew/native-bridge"
contracts_package = "@rusty-crew/contracts"
error_type = "CoreError"
handle_types = [
  "EngineHandle",
  "SessionHandle",
  "BrainImplementationHandle",
  "PlatformAdapterHandle",
  "SubscriptionHandle",
  "RuntimeBufferHandle",
]

# Engine lifecycle: constructing and draining the single-process fleet.

[[operation]]
name = "initialize_engine"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::EngineConfig"
output = "core_protocol::EngineHandle"
errors = "core_protocol::CoreError"
summary = "Create the single-process Rust coordination engine."

[[operation]]
name = "shutdown_engine"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::ShutdownRequest"
output = "core_protocol::ShutdownSummary"
errors = "core_protocol::CoreError"
summary = "Drain and close the Rust coordination engine."

# Brain island registration and wake path.

[[operation]]
name = "register_brain_implementation"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::BrainImplementationRegistration"
output = "core_protocol::BrainImplementationHandle"
errors = "core_protocol::CoreError"
summary = "Register a TS brain implementation/profile/tool catalog for Rust-driven activation."

[[operation]]
name = "replace_brain_implementation"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::BrainImplementationRegistration"
output = "core_protocol::BrainImplementationHandle"
errors = "core_protocol::CoreError"
summary = "Replace a registered profile brain implementation in place for safe runtime rebuilds."

[[operation]]
name = "unregister_brain_implementation_for_profile"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::ProfileId"
output = "core_protocol::BrainImplementationHandle"
errors = "core_protocol::CoreError"
summary = "Remove a registered profile brain implementation after its sessions have been drained or archived."

[[operation]]
name = "wake_brain"
surface = "stable"
direction = "rust_to_ts"
input = "core_protocol::BrainWakeRequest"
output = "core_protocol::BrainWakeAccepted"
errors = "core_protocol::CoreError"
summary = "Rust invokes the TS brain island with a frozen body-state snapshot."
buffer_contract = "BrainWakeRequest carries body_state, system_prompt, and role_assembly as RuntimeBufferHandle leases; TS must release each handle exactly once after hydration."
delta_policy = "BodyState.delta_policy is frozen_snapshot_next_wake. Mid-turn deltas are not injected into the active provider stream; fresh deltas may be considered by the body-owned next-wake queue with a 5000 ms default TTL and 32 message cap. Expired queued messages are dropped, not replayed."

[[operation]]
name = "submit_brain_event"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::BrainEventEnvelope"
output = "core_protocol::EventReceipt"
errors = "core_protocol::CoreError"
summary = "TS streams brain events produced during a Rust-driven wake."
throughput_note = "True napi measurement is documented in docs/ffi-throughput-napi.md. Use a hybrid policy: lifecycle and coordination facts remain per-event; high-rate text_delta streams must be coalesced before durable submission when expected rate exceeds 250 deltas/sec, when multiple streams are active, or when fragments are token-sized."
throughput_policy = "Flush text coalescing at 16-64 deltas, 20-50 ms, 16 KiB of accumulated UTF-8 text, finished, or a tool-call boundary. Revisit only after p95 submit latency is below 1 ms and sustained throughput exceeds 1000 deltas/sec."

[[operation]]
name = "submit_brain_actions"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::BrainActionBatch"
output = "core_protocol::ActionBatchReceipt"
errors = "core_protocol::CoreError"
summary = "TS returns the structured brain action batch; Rust validates and executes it internally."

[[operation]]
name = "apply_brain_provider_state_output"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::BrainWakeProviderStateOutput"
output = "()"
errors = "core_protocol::CoreError"
summary = "Apply provider-owned wire-state replacement or clear output for a brain wake."

# Platform adapters: external systems inject/project through the bus.

[[operation]]
name = "register_platform_adapter"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::PlatformAdapterRegistration"
output = "core_protocol::PlatformAdapterHandle"
errors = "core_protocol::CoreError"
summary = "Register a TS platform adapter such as Den, Telegram, MCP, TUI, or CLI."

[[operation]]
name = "validate_runtime_config_draft"
surface = "stable"
direction = "ts_to_rust"
input = "core_config::RuntimeConfigValidationInput"
output = "core_config::RuntimeConfigValidationResult"
errors = "core_protocol::CoreError"
summary = "Validate a service runtime config draft and TS-loaded profile runtime metadata without mutating files or engine state."

[[operation]]
name = "plan_runtime_config"
surface = "stable"
direction = "ts_to_rust"
input = "core_config::RuntimeConfigValidationInput"
output = "core_config::RuntimeConfigPlan"
errors = "core_protocol::CoreError"
summary = "Validate and expand a service runtime config draft with profile-derived session defaults, MCP bindings, and background review jobs without mutating files or engine state."

[[operation]]
name = "plan_create_profile"
surface = "stable"
direction = "ts_to_rust"
input = "core_config::CreateProfilePlanInput"
output = "core_config::CreateProfilePlan"
errors = "core_protocol::CoreError"
summary = "Plan runtime/profile seed defaults for an admin create-profile request without writing files or mutating engine state."

[[operation]]
name = "inject_external_event"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::ExternalEvent"
output = "core_protocol::EventReceipt"
errors = "core_protocol::CoreError"
summary = "Inject an external adapter event into the internal Rust bus."

[[operation]]
name = "inject_den_data_update"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::DenDataUpdate"
output = "core_protocol::EventReceipt"
errors = "core_protocol::CoreError"
summary = "Inject Den product-data updates without making Den the coordination authority."

[[operation]]
name = "enqueue_body_follow_up_message"
surface = "stable"
direction = "ts_to_rust"
input = "session_id + core_protocol::AgentId + body + correlation_id"
output = "queued_message_record"
errors = "core_protocol::CoreError"
summary = "Queue a steer/follow-up message for the next Rust-owned wake with body-policy TTL and cap enforcement."

[[operation]]
name = "ensure_configured_session"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::SessionConfig"
output = "core_protocol::SessionState"
errors = "core_protocol::CoreError"
summary = "Create, reuse, or safely reactivate a configured durable service session without minting a replacement session ID."

# Scheduler operator controls. The scheduler remains Rust-owned; these bridge
# calls are deliberate host/admin entrypoints for registering wake jobs,
# triggering ticks, manual runs, and pausing/resuming durable jobs.

[[operation]]
name = "register_scheduled_wake_job"
surface = "stable"
direction = "ts_to_rust"
input = "(job_id: String, target_session_id: core_protocol::SessionId, interval_ms: Option<u64>, first_due_at: IsoTimestamp)"
output = "scheduled_job_summary"
errors = "core_protocol::CoreError"
summary = "Create or replace a Rust-owned scheduled wake job for an existing wakeable session."

[[operation]]
name = "register_scheduled_host_job"
surface = "stable"
direction = "ts_to_rust"
input = "(job_id: String, job_kind: String, interval_ms: Option<u64>, first_due_at: IsoTimestamp, payload_json: JsonValue)"
output = "scheduled_job_summary"
errors = "core_protocol::CoreError"
summary = "Create or replace a Rust-owned scheduled host-executable job with a typed non-wake job kind."

[[operation]]
name = "list_scheduled_jobs"
surface = "stable"
direction = "ts_to_rust"
input = "(status: Option<scheduled_job_status>, job_kind: Option<String>, limit: Option<u32>, offset: Option<u32>)"
output = "Vec<scheduled_job_summary>"
errors = "core_protocol::CoreError"
summary = "List Rust-owned scheduled jobs for admin diagnostics and operator tooling."

[[operation]]
name = "list_scheduled_runs"
surface = "stable"
direction = "ts_to_rust"
input = "(job_id: Option<String>, status: Option<scheduled_run_status>, trigger: Option<scheduled_run_trigger>, target_session_id: Option<core_protocol::SessionId>, limit: Option<u32>, offset: Option<u32>)"
output = "Vec<scheduled_run_summary>"
errors = "core_protocol::CoreError"
summary = "List scheduled job run history for admin diagnostics and operator tooling."

[[operation]]
name = "claim_scheduled_host_runs"
surface = "stable"
direction = "ts_to_rust"
input = "(supported_job_kinds: Vec<String>, limit: Option<u32>)"
output = "Vec<scheduled_run_summary>"
errors = "core_protocol::CoreError"
summary = "Claim due host-executable scheduled runs for supported job kinds without executing them in Rust."

[[operation]]
name = "request_scheduled_host_job_run"
surface = "stable"
direction = "ts_to_rust"
input = "(job_id: String, supported_job_kinds: Vec<String>)"
output = "Option<scheduled_run_summary>"
errors = "core_protocol::CoreError"
summary = "Request and claim a manual run for a supported host-executable scheduled job."

[[operation]]
name = "complete_scheduled_host_run"
surface = "stable"
direction = "ts_to_rust"
input = "(run_id: core_protocol::RunId, status: scheduled_run_status, output_json: JsonValue, error: Option<String>)"
output = "core_protocol::Unit"
errors = "core_protocol::CoreError"
summary = "Complete, fail, skip, or cancel a claimed host-executable scheduled run with bounded output."

[[operation]]
name = "run_scheduler_tick"
surface = "stable"
direction = "ts_to_rust"
input = "unit"
output = "scheduler_tick_report"
errors = "core_protocol::CoreError"
summary = "Run one Rust-owned scheduler tick and return compact execution counts."

[[operation]]
name = "request_scheduled_job_run"
surface = "stable"
direction = "ts_to_rust"
input = "job_id: String"
output = "Option<scheduled_run_summary>"
errors = "core_protocol::CoreError"
summary = "Request a manual run for a non-archived scheduled job."

[[operation]]
name = "pause_scheduled_job"
surface = "stable"
direction = "ts_to_rust"
input = "job_id: String"
output = "core_protocol::Unit"
errors = "core_protocol::CoreError"
summary = "Pause a Rust-owned scheduled job."

[[operation]]
name = "resume_scheduled_job"
surface = "stable"
direction = "ts_to_rust"
input = "(job_id: String, next_due_at: IsoTimestamp)"
output = "core_protocol::Unit"
errors = "core_protocol::CoreError"
summary = "Resume a Rust-owned scheduled job with an explicit next due time."

# Delegation operator controls. These are typed control requests into the Rust
# lifecycle state machine; adapters must not edit Den state as if it were
# coordination state.

[[operation]]
name = "cancel_delegated_session"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::SessionId"
output = "core_protocol::SessionState"
errors = "core_protocol::CoreError"
summary = "Cancel one nonterminal delegated session through Rust lifecycle state."

[[operation]]
name = "request_delegated_checkpoint"
surface = "stable"
direction = "ts_to_rust"
input = "(parent_session_id: core_protocol::SessionId, delegated_session_id: core_protocol::SessionId, reason: String)"
output = "core_protocol::EventReceipt"
errors = "core_protocol::CoreError"
summary = "Route a checkpoint request to a delegated session and mark the run checkpoint-waiting."

[[operation]]
name = "drain_delegated_sessions"
surface = "stable"
direction = "ts_to_rust"
input = "Option<core_protocol::SessionId>"
output = "Vec<core_protocol::SessionId>"
errors = "core_protocol::CoreError"
summary = "Cancel active delegated sessions, optionally scoped to one parent session."

[[operation]]
name = "cleanup_delegated_resources"
surface = "stable"
direction = "ts_to_rust"
input = "unit"
output = "core_protocol::DelegatedResourceCleanupReport"
errors = "core_protocol::CoreError"
summary = "Run the Rust-owned delegated session cleanup loop and return a compact evidence report."

[[operation]]
name = "delegated_session_status"
surface = "stable"
direction = "ts_to_rust"
input = "core_protocol::SessionId"
output = "core_protocol::DelegatedSessionRuntimeStatus"
errors = "core_protocol::CoreError"
summary = "Read Rust-owned delegated session status for operator display."

[[operation]]
name = "list_sessions"
surface = "stable"
direction = "ts_to_rust"
input = "unit"
output = "Vec<core_protocol::SessionState>"
errors = "core_protocol::CoreError"
summary = "List Rust-owned runtime sessions for diagnostics and debug context."

